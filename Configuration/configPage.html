<div id="configPage" data-role="page" class="page pattern">
    <div style="margin-top: 60px; margin-left: 20px;">
        <h3>Strm Tool 设置</h3>
        <div class="verticalSection">
            <div class="checkboxContainer">
                <label>
                    <input type="checkbox" id="chkEnableAutoExtract" />
                    自动提取新入库 strm 文件的媒体信息
                </label>
                <div class="fieldDescription">启用后，新增的 strm 文件会自动在后台执行媒体信息提取，无需手动运行计划任务</div>
            </div>
        </div>
        <br />
        <div class="verticalSection">
            <div class="checkboxContainer">
                <label>
                    <input type="checkbox" id="chkEnableMediaInfoCache" />
                    启用媒体信息缓存
                </label>
                <div class="fieldDescription">启用后，提取的媒体信息会保存到 xxx.json 文件中，避免重复探测</div>
            </div>
        </div>
        <br />
        <div class="verticalSection">
            <div class="inputContainer">
                <label for="txtCacheExpirationDays">缓存过期天数</label>
                <input type="number" id="txtCacheExpirationDays" min="1" step="1" />
                <div class="fieldDescription">缓存文件超过此天数后会被重新探测</div>
            </div>
        </div>
        <br />
        <div class="verticalSection">
            <div class="inputContainer">
                <label for="txtRefreshDelay">刷新延迟 (毫秒)</label>
                <input type="number" id="txtRefreshDelay" min="0" step="100" />
                <div class="fieldDescription">每次刷新媒体信息后等待的毫秒数，用于避免对远程服务器造成压力</div>
            </div>
        </div>
        <br />
        <button id="btnSave" data-role="button">保存</button>
    </div>

    <script>
        var form = this;

        function loadConfig() {
            ApiClient.getPluginConfiguration('6107fc8c-883a-4171-b70e-7590658706B9').then(function(config) {
                document.getElementById('chkEnableAutoExtract').checked = config.EnableAutoExtract !== false;
                document.getElementById('chkEnableMediaInfoCache').checked = config.EnableMediaInfoCache !== false;
                document.getElementById('txtCacheExpirationDays').value = config.CacheExpirationDays || 7;
                document.getElementById('txtRefreshDelay').value = config.RefreshDelayMs || 1000;
            });
        }

        function saveConfig() {
            var config = {
                EnableAutoExtract: document.getElementById('chkEnableAutoExtract').checked,
                EnableMediaInfoCache: document.getElementById('chkEnableMediaInfoCache').checked,
                CacheExpirationDays: parseInt(document.getElementById('txtCacheExpirationDays').value) || 7,
                RefreshDelayMs: parseInt(document.getElementById('txtRefreshDelay').value) || 1000
            };

            ApiClient.updatePluginConfiguration('6107fc8c-883a-4171-b70e-7590658706B9', config).then(function() {
                Dashboard.alert('设置已保存');
            });
        }

        document.getElementById('btnSave').addEventListener('click', saveConfig);

        loadConfig();
    </script>
</div>
